x-nest-service: &nest-service
  env_file:
    - ./backend/.env.dev
  environment:
    - REDIS_HOST=redis
    - REDIS_CLIENT_HOST=redis
    - RMQ_URL=amqp://guest:guest@rabbitmq:5672/
    - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
  networks:
    - app-network
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_started
    postgres:
      condition: service_started
    mongo_db:
      condition: service_started
    chroma:
      condition: service_started
    minio:
      condition: service_started

services:
  rabbitmq:
    image: rabbitmq:management
    hostname: rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network

  redis:
    image: redis:alpine
    hostname: redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  postgres:
    image: postgres:alpine
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-network

  meili-search:
    image: getmeili/meilisearch:v1.16
    container_name: meili_search
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "A7Uu1TlCVUtQRaUpFY9Z2sLoJeZMYVi0"
    volumes:
      - meili-data:/meili_data
    networks:
      - app-network

  chroma:
    image: chromadb/chroma
    command: run --host 0.0.0.0 --port 8000
    container_name: chroma_db_server
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/.chroma/chroma
    networks:
      - app-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: always
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"
    command: --config /etc/livekit.yml
    volumes:
      - ./web_rtc/livekit.yml:/etc/livekit.yml
    networks:
      - app-network
    depends_on:
      - redis

  livekit-egress:
    image: livekit/egress:latest
    restart: always
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yml
    volumes:
      - ./web_rtc/livekit-egress.yml:/etc/egress.yml
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: '2gb'
    depends_on:
      - livekit
      - redis
      - minio

  chatbot:
    build:
      context: ./python/chatbot-service
      dockerfile: Dockerfile
    image: chanhhyy197/taskora-chatbot:latest
    container_name: python_chatbot_worker
    restart: unless-stopped
    env_file:
      - ./python/chatbot-service/chatbot.env
    volumes:
      - ./python/chatbot-service:/app
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "documents"
      REDIS_HOST: "redis"
      THREADPOOL_MAX_WORKERS: "4"
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      chroma:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: minio_service
    ports:
      - "9000:9000"
      - "9001:9001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_NOTIFY_WEBHOOK_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_PRIMARY: "http://api-gateway:3000/webhooks/upload-completed"
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    command: [ "server", "--console-address", ":9001", "/data" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio-data:/data
    networks:
      - app-network

  minio-setup:
    image: minio/mc:latest
    container_name: minio-mc-setup
    # depends_on:
    #   minio:
    #     condition: service_healthy
    entrypoint: >
      /bin/sh -c " until (mc alias set myminio http://minio:9000 minioadmin minioadmin); do echo '...waiting...' && sleep 1; done; mc mb myminio/meeting-recordings; mc event add myminio/documents arn:minio:sqs::PRIMARY:webhook --event put; echo 'MinIO Webhook Setup Complete!'; exit 0; "
    networks:
      - app-network

  mongo_db:
    image: mongo:8.0
    container_name: mongo_db
    ports:
      - "27017:27017"
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGODB_URI=mongodb://mongo_db:27017/mongo_db?directConnection=true
      - MONGO_HOST=mongo_db
    networks:
      - app-network

  mongo_rs_init:
    image: mongo:8.0
    depends_on:
      - mongo_db
    volumes:
      - ./init-mongo.sh:/scripts/init-mongo.sh
    entrypoint: [ "bash", "-c", "chmod +x /scripts/init-mongo.sh && /scripts/init-mongo.sh" ]
    networks:
      - app-network
  api_gateway:
    <<: *nest-service
    container_name: api-gateway
    image: chanhhyy197/taskora-api-gateway:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
    ports:
      - "3000:3000"
    environment:
      - RMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - NODE_ENV=production
    networks:
      app-network:
        aliases:
          - api-gateway

  auth_service:
    <<: *nest-service
    container_name: auth_service
    image: chanhhyy197/taskora-auth-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: auth

  user_service:
    <<: *nest-service
    image: chanhhyy197/taskora-user-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: user
    container_name: user_service

  project_service:
    <<: *nest-service
    container_name: project_service
    image: chanhhyy197/taskora-project-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: project-service

  task_service:
    <<: *nest-service
    container_name: task_service
    image: chanhhyy197/taskora-task-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: task-service

  sprint_service:
    <<: *nest-service
    container_name: sprint_service
    image: chanhhyy197/taskora-sprint-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: sprint-service

  epic_service:
    <<: *nest-service
    container_name: epic_service
    image: chanhhyy197/taskora-epic-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: epic-service

  label_service:
    <<: *nest-service
    container_name: label_service
    image: chanhhyy197/taskora-label-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: label-service

  list_service:
    <<: *nest-service
    container_name: list_service
    image: chanhhyy197/taskora-list-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: list-service

  team_service:
    <<: *nest-service
    container_name: team_service
    image: chanhhyy197/taskora-team-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: team

  socket_service:
    <<: *nest-service
    container_name: socket_service
    image: chanhhyy197/taskora-socket-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: socket
    ports:
      - "4001:4001"

  discussion_service:
    <<: *nest-service
    container_name: discussion_service
    image: chanhhyy197/taskora-discussion-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: discussion

  notification_service:
    <<: *nest-service
    image: chanhhyy197/taskora-notification-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: notification

  ai_discussion_service:
    <<: *nest-service
    container_name: ai_discussion_service
    image: chanhhyy197/taskora-ai-discussion-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: discussion-ai

  calendar_service:
    <<: *nest-service
    container_name: calendar_service
    image: chanhhyy197/taskora-calendar-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: calendar-service

  gmail_service:
    <<: *nest-service
    container_name: gmail_service
    image: chanhhyy197/taskora-gmail-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: gmail

  file_service:
    <<: *nest-service
    container_name: file_service
    image: chanhhyy197/taskora-file-service:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_NAME: file

  web_rtc_service:
    image: chanhhyy197/taskora-web-rtc-service:latest
    build:
      context: ./web_rtc
      dockerfile: Dockerfile
    container_name: web_rtc_service
    ports:
      - "8005:8005"
    env_file:
      - ./web_rtc/.env
    environment:
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=4msnddOgHpRlhfN1P2uVM0akISxFJJPY
      - RMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8005
      - DATABASE_VIDEO_CHAT_URL=postgresql://postgres:postgres@postgres:5432/call
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ENDPOINT_PUBLIC=${NEXT_PUBLIC_MINIO_URL:-http://127.0.0.1:9000}
      - MINIO_ENDPOINT_INTERNAL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_RECORDING_BUCKET=meeting-recordings
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      livekit:
        condition: service_started
    networks:
      - app-network

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://mongo_db:27017/mongo_db?directConnection=true
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo_db

  frontend:
    image: chanhhyy197/taskora-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-ws://127.0.0.1:4001}
        NEXT_PUBLIC_WEBRTC_WS_URL: ${NEXT_PUBLIC_WEBRTC_WS_URL:-ws://127.0.0.1:8005/ws}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-http://127.0.0.1:7880}
    container_name: nextjs_frontend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - INTERNAL_API_URL=http://api_gateway:3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://127.0.0.1:3001}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-ws://127.0.0.1:4001}
      - NEXT_PUBLIC_WEBRTC_WS_URL=${NEXT_PUBLIC_WEBRTC_WS_URL:-ws://127.0.0.1:8005/ws}
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL:-http://127.0.0.1:7880}
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  chroma-data:
  mongo-data:
  meili-data:


networks:
  app-network:
    driver: bridge
